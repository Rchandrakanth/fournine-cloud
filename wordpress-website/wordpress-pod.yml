apiVersion: v1
kind: Pod
metadata: 
  name: wordpress-pod
  labels:
    name: wordpress-pod
    app: wordpress
spec:
  containers:
  - name: wordpress-container
    image: wordpress:latest 
    ports:
    - containerPort: 80
    env:
    - name: WORDPRESS_DB_NAME
      value: "wordpress"
    - name: WORDPRESS_DB_USER
      value: "wp-user"
    - name:  WORDPRESS_DB_PASSWORD
      value: "@Strongpassword@1234@"
    - name: WORDPRESS_DB_HOST
      value: "mysql-service:3306"

