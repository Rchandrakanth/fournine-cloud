apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-statefulset
spec:
  replicas: 1
  serviceName: redis-service
  selector:
    matchLabels:
      app: redis
  
  template:
    metadata: 
      name: redis-pod
      labels:
        app: redis
    spec:
      containers:
      - name: redis-container
        image: redis
        ports:
        - containerPort: 6379
 
 
