apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wordpress-statefulset
  labels:
    app: wordpress
spec:
  replicas: 2
  serviceName: wordpress-statefulset-svc
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      name: wordpress-pod
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress-container
        image: wordpress:latest
        ports:
        - containerPort: 80

        env:
        - name: WORDPRESS_DB_HOST
          value: "mysql-statefulset-svc:3306"
     
        - name: WORDPRESS_DB_NAME
          valueFrom: 
            secretKeyRef:
              name: wordpress-secrets
              key: WORDPRESS_DB_NAME
        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: wordpress-secrets
              key: WORDPRESS_DB_USER
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-secrets
              key: WORDPRESS_DB_PASSWORD

        volumeMounts:
        - name: wordpress-pv-storage
          mountPath: /var/www/html 

  volumeClaimTemplates:
  - metadata:
      name: wordpress-pv-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
